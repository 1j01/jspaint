<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>JS Paint - Choose Your Experience</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="description" content="Classic MS Paint in the browser, with extra features. Choose between the modern React version or the classic jQuery app.">

	<!-- Icons -->
	<link rel="icon" href="/favicon.ico">
	<link rel="shortcut icon" href="/favicon.ico">
	<link rel="apple-touch-icon" href="/images/icons/apple-icon-180x180.png">
	<link rel="mask-icon" href="/images/icons/safari-pinned-tab.svg" color="red">
	<link rel="manifest" href="/manifest.webmanifest">

	<!-- Theme colors -->
	<meta name="theme-color" content="#000080">
	<meta name="msapplication-TileColor" content="#008080">
	<meta name="msapplication-TileImage" content="/images/icons/144x144.png">

	<!-- Open Graph / Facebook -->
	<meta property="og:type" content="website">
	<meta property="og:title" content="JS Paint">
	<meta property="og:description" content="Classic MS Paint in the browser, with extra features.">
	<meta property="og:url" content="https://jspaint.app">
	<meta property="og:image" content="https://jspaint.app/images/icons/og-image-279x279.jpg">
	<meta property="og:image:width" content="279">
	<meta property="og:image:height" content="279">

	<!-- Twitter Card -->
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="JS Paint">
	<meta name="twitter:description" content="Classic MS Paint in the browser, with extra features">
	<meta name="twitter:image" content="https://jspaint.app/images/meta/twitter-card-plz-no-crop.png">
	<meta name="twitter:site" content="@isaiahodhner">
	<meta name="twitter:creator" content="@isaiahodhner">

	<!-- Stylesheets -->
	<link rel="stylesheet" href="/styles/react-preview.css">
</head>
<body>
	<div class="react-preview__app-shell">
		<header class="react-preview__header">
			<h1>Choose your JS Paint experience</h1>
			<p>Try the new React-based prototype or stay with the classic jQuery-powered app.</p>
		</header>
		<div class="react-preview__cta-row">
			<a class="react-preview__cta" href="/new/">Open React preview</a>
			<a class="react-preview__cta secondary" href="/old/">Open legacy app</a>
		</div>
		<p class="react-preview__footer">
			You can switch between builds at any time. Bookmark <code>/new/</code> for the modern workspace and
			<code>/old/</code> for the legacy experience.
		</p>
	</div>
</body>
</html>
